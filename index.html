<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>T-Coin Authentication Portal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="tcoin.png" type="image/png" />
  <style>
    .hidden { display: none; }
    .toggle-link { text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="formTitle">T-Coin Sign Up</h2>

    <!-- Registration Form -->
    <form id="registrationForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      <div id="errorMessage" class="error"></div>
      <button type="submit">Register</button>
    </form>

    <!-- Login Form -->
    <form id="loginForm" class="hidden">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <div id="loginError" class="error"></div>
      <button type="submit">Login</button>
    </form>

    <!-- Toggle Links -->
    <p class="toggle-link">
      <span id="toggleToLogin">Already have an account? <a href="#">Login here</a></span>
      <span id="toggleToRegister" class="hidden">Don’t have an account? <a href="#">Register here</a></span>
    </p>
  </div>

  <script>
    const formTitle = document.getElementById('formTitle');
    const registrationForm = document.getElementById('registrationForm');
    const loginForm = document.getElementById('loginForm');
    const toggleToLogin = document.getElementById('toggleToLogin');
    const toggleToRegister = document.getElementById('toggleToRegister');

    // Toggle between forms
    toggleToLogin.addEventListener('click', () => {
      registrationForm.classList.add('hidden');
      loginForm.classList.remove('hidden');
      toggleToLogin.classList.add('hidden');
      toggleToRegister.classList.remove('hidden');
      formTitle.textContent = "T-Coin Login";
    });

    toggleToRegister.addEventListener('click', () => {
      loginForm.classList.add('hidden');
      registrationForm.classList.remove('hidden');
      toggleToRegister.classList.add('hidden');
      toggleToLogin.classList.remove('hidden');
      formTitle.textContent = "T-Coin Sign Up";
    });

    // Registration handler
    registrationForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMessage = document.getElementById('errorMessage');

      if (password !== confirmPassword) {
        errorMessage.textContent = "Passwords do not match!";
        return;
      }

      try {
        const response = await fetch('http://localhost:5000/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await response.json();
        if (response.ok) {
          alert(data.message);
          registrationForm.reset();
        } else {
          errorMessage.textContent = data.error;
        }
      } catch (err) {
        errorMessage.textContent = "Server error: " + err.message;
      }
    });

    // Login handler
    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const loginError = document.getElementById('loginError');

      try {
        const response = await fetch('http://localhost:5000/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          window.location.href = "dashboard.html";
        } else {
          loginError.textContent = data.error;
        }
      } catch (err) {
        loginError.textContent = "Server error: " + err.message;
      }
    });
  </script>
</body>
</html>
